<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="admin.css">

</head>
<body>
<!-- ========================= -->
<!-- DASHBOARD ADMIN -->
<!-- ========================= -->

<button class="dark-toggle" onclick="toggleDark()">
    <i class="fa-solid fa-moon"></i>
</button>

<section id="dashboardPage">

    <div class="stats-grid">

        <div class="stat-card blue">
    
            <div class="stat-content">
    
                <h4>Sedang Dipinjam</h4>
    
                <h2 id="totalPinjam">0</h2>
    
            </div>
    
            <div class="stat-icon">
                <i class="fa-solid fa-box-open"></i>
            </div>
    
        </div>
    
    </div>

        <div class="card green">

            <div>
                <h4>Sudah Dikembalikan</h4>
                <h2 id="totalReturn">0</h2>
            </div>

            <i class="fa-solid fa-check fa-2x"></i>

        </div>

        <div class="card orange">

            <div>
                <h4>Total Barang</h4>
                <h2 id="totalBarang">0</h2>
            </div>

            <i class="fa-solid fa-boxes-stacked fa-2x"></i>

        </div>

    </div>

</section>



<!-- ========================= -->
<!-- DAFTAR BARANG -->
<!-- ========================= -->

<section id="barangPage">

<div class="toolbar">

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input

type="text"

placeholder="Cari barang..."

id="search"

onkeyup="searchBarang(this.value)"

>

</div>

</div>


<div class="grid" id="list">

<!-- Card Barang akan dibuat oleh user.js -->

</div>

</section>




<!-- ========================= -->
<!-- RIWAYAT PEMINJAMAN -->
<!-- ========================= -->

<section id="riwayatPage">

<div class="table-card">

<div class="title">

<h2>

Riwayat Peminjaman Saya

</h2>

</div>

<table>

<thead>

<tr>

<th>Barang</th>

<th>Jumlah</th>

<th>Status</th>

<th>Tanggal</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="historyTable">

</tbody>

</table>

</div>

</section>




<!-- ========================= -->
<!-- MODAL PINJAM -->
<!-- ========================= -->

<div class="modal" id="pinjamModal">

<div class="modal-content">

<div class="modal-header">

<h2 id="modalBarang">

Nama Barang

</h2>

<span class="close-modal" onclick="closeModal()">
    <i class="fa-solid fa-xmark"></i>
</span>

</div>


<div class="modal-body">

<label>

Jumlah Pinjam

</label>

<input

id="qty-${doc.id}"
value="1"
min="1"
max="${data.jumlah}"

>


<label>

Kelas

</label>

<input

type="text"

id="kelas"

readonly

>

</div>


<div class="modal-footer">

<button

class="btn-secondary"

onclick="closeModal()"

>

Batal

</button>


<button

class="btn-primary"

onclick="konfirmasiPinjam()"

>

Pinjam

</button>

</div>

</div>

</div>

<!-- ====================================================== -->
<!-- TOAST NOTIFICATION -->
<!-- ====================================================== -->

<div id="toast" class="toast">
    <i class="fa-solid fa-circle-check"></i>
    <span id="toastText">Berhasil</span>
</div>

<!-- ====================================================== -->
<!-- LOADING -->
<!-- ====================================================== -->

<div id="loading" class="loading">

    <div class="loader"></div>

    <p>Memproses...</p>

</div>

<!-- ====================================================== -->
<!-- FOOTER -->
<!-- ====================================================== -->

<footer>

    <p>

        © 2026 Inventaris Kelas

        <strong>Firebase Realtime Database</strong>

    </p>

</footer>

<!-- ====================================================== -->
<!-- SCRIPT -->
<!-- ====================================================== -->

<script type="module" src="user.js"></script>

<script>

// ================================
// DARK MODE
// ================================

function toggleDark(){

document.body.classList.toggle("dark");

localStorage.setItem(
"darkMode",
document.body.classList.contains("dark")
);

}

if(localStorage.getItem("darkMode")=="true"){

document.body.classList.add("dark");

}



// ================================
// SEARCH BARANG
// ================================

function searchBarang(keyword){

    keyword = keyword.toLowerCase();

    let cards = document.querySelectorAll(".item-card");

    cards.forEach(card=>{

        card.style.display =
            card.innerText.toLowerCase().includes(keyword)
            ? ""
            : "none";

    });

}



// ================================
// TOAST
// ================================

window.showToast=function(text){

let toast=document.getElementById("toast");

document.getElementById("toastText").innerHTML=text;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},2500);

}



// ================================
// LOADING
// ================================

window.showLoading=function(){

document.getElementById("loading").style.display="flex";

}

window.hideLoading=function(){

document.getElementById("loading").style.display="none";

}



// ================================
// MODAL
// ================================

window.closeModal=function(){

document.getElementById("pinjamModal").style.display="none";

}

</script>

</body>

</html>
