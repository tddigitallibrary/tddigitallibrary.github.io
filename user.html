<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>User Inventaris</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body{
font-family:'Inter',sans-serif;
margin:0;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
transition:0.3s;
}

/* DARK MODE */
body.dark{
background:#0f172a;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

/* SEARCH */
.search{
padding:10px;
border-radius:8px;
border:none;
width:200px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
position:relative;
}

.card:hover{
transform:translateY(-5px) scale(1.02);
}

/* DARK CARD */
body.dark .card{
background:#1e293b;
}

/* BADGE */
.badge{
position:absolute;
top:10px;
right:10px;
background:#6366f1;
color:white;
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

/* BUTTON */
button{
margin-top:10px;
padding:8px;
border:none;
border-radius:8px;
background:#10b981;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
}

/* DISABLED */
button:disabled{
background:#9ca3af;
cursor:not-allowed;
}

/* TOP BUTTONS */
.top-btn{
margin-left:10px;
background:#6366f1;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1>📦 Inventaris Kelas</h1>

<div>
<input class="search" id="search" placeholder="Cari barang..." onkeyup="searchBarang(this.value)">

<button class="top-btn" onclick="toggleDark()">🌙</button>
<button class="top-btn" onclick="logout()">Logout</button>
</div>

</div>

<!-- LIST BARANG -->
<div class="grid" id="list"></div>


<script type="module" src="user.js"></script>

<script>

// DARK MODE
function toggleDark(){
document.body.classList.toggle("dark");
}

// SEARCH
function searchBarang(keyword){

let cards = document.querySelectorAll(".card");

cards.forEach(card=>{
let text = card.innerText.toLowerCase();
card.style.display = text.includes(keyword.toLowerCase()) ? "" : "none";
});

}

</script>

</body>
</html>
