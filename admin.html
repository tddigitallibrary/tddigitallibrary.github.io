<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
transition:0.3s;
}

body.dark{
background:#0f172a;
color:white;
}

/* LAYOUT */
.layout{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:rgba(17,24,39,0.9);
backdrop-filter:blur(10px);
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.menu{
margin:15px 0;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.menu:hover{
background:#374151;
}

/* MAIN */
.main{
flex:1;
padding:25px;
overflow:auto;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.search{
padding:10px;
border-radius:8px;
border:none;
width:200px;
}

/* CARD */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px) scale(1.02);
}

/* TABLE */
.table-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

th, td{
text-align:left;
padding:12px;
}

th{
background:#f1f5f9;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

/* BUTTON */
.btn{
padding:8px 12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.modal-box{
background:white;
padding:20px;
width:320px;
margin:100px auto;
border-radius:15px;
display:flex;
flex-direction:column;
gap:10px;
animation:fade 0.3s;
}

@keyframes fade{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;}
}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>📦 Inventaris</h2>

<div class="menu" onclick="openModal()">+ Tambah Barang</div>
<div class="menu" onclick="toggleDark()">🌙 Dark Mode</div>
<div class="menu" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h1>Dashboard Admin</h1>
<input class="search" placeholder="Cari barang..." onkeyup="search(this.value)">
</div>

<!-- CARDS -->
<div class="cards">
<div class="card"><h3>Total Barang</h3><p id="totalBarang">0</p></div>
<div class="card"><h3>Stok Habis</h3><p id="stokHabis">0</p></div>
</div>

<!-- TABLE -->
<div class="table-box">
<h2>Data Barang</h2>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Jenis</th>
<th>Jumlah</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3>Tambah / Edit</h3>

<input id="nama" placeholder="Nama">
<input id="jenis" placeholder="Jenis">
<input id="jumlah" type="number" placeholder="Jumlah">

<button class="btn" onclick="simpan()">Simpan</button>
<button class="btn" onclick="tutup()">Tutup</button>

</div>
</div>

<script type="module" src="admin.js"></script>

</body>
</html>
