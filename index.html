<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Inventaris Kelas</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- ==========================
             LEFT PANEL
        =========================== -->

        <div class="left">

            <div class="hero">

                <div class="logo">

                    📦

                </div>

                <h1>Inventaris Kelas</h1>

                <p>
                    Kelola barang kelas dengan mudah,
                    cepat, dan modern menggunakan
                    sistem inventaris berbasis web.
                </p>

            </div>

        </div>

        <!-- ==========================
             RIGHT PANEL
        =========================== -->

        <div class="right">

            <!-- Toggle -->
            <div class="toggle">

                <button id="btnLogin" class="active">
                    Login
                </button>

                <button id="btnRegister">
                    Register
                </button>

            </div>

            <!-- Form Wrapper -->
            <div class="form-wrapper">

                <div class="form-container login" id="formContainer">
                                      <!-- ==========================
                         LOGIN
                    =========================== -->

                    <div class="form">

                      <h2>Login</h2>

                      <input
                          type="email"
                          id="loginEmail"
                          placeholder="Masukkan Email"
                          required
                      >

                      <input
                          type="password"
                          id="loginPassword"
                          placeholder="Masukkan Password"
                          required
                      >

                      <button
                          class="btn"
                          onclick="login()"
                      >
                          Masuk
                      </button>

                  </div>

                  <!-- ==========================
                       REGISTER
                  =========================== -->

                  <div class="form">

                      <h2>Registrasi Siswa</h2>

                      <input
                          type="text"
                          id="nama"
                          placeholder="Nama Lengkap"
                          required
                      >

                      <select id="kelas" required>

                          <option value="">
                              Pilih Kelas
                          </option>

                          <option>X 1</option>
                          <option>X 2</option>
                          <option>X 3</option>
                          <option>X 4</option>

                          <option>XI IPA 1</option>
                          <option>XI IPA 2</option>
                          <option>XI IPS 1</option>
                          <option>XI IPS 2</option>

                          <option>XII IPA 1</option>
                          <option>XII IPA 2</option>
                          <option>XII IPS 1</option>
                          <option>XII IPS 2</option>

                      </select>

                      <input
                          type="email"
                          id="regEmail"
                          placeholder="Masukkan Email"
                          required
                      >

                      <input
                          type="password"
                          id="regPassword"
                          placeholder="Masukkan Password"
                          required
                      >

                      <button
                          class="btn"
                          onclick="register()"
                      >
                          Daftar
                      </button>

                  </div>

              </div>
          </div>

      </div>

  </div>
  <script type="module">

    // ===========================
// IMPORT FIREBASE
// ===========================

import { auth, db } from "./firebase.js";

import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    updateProfile
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
    doc,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


// ===========================
// TOGGLE LOGIN & REGISTER
// ===========================

const container = document.getElementById("formContainer");

const btnLogin = document.getElementById("btnLogin");
const btnRegister = document.getElementById("btnRegister");

btnRegister.onclick = function () {

    container.classList.remove("login");
    container.classList.add("register");

    btnRegister.classList.add("active");
    btnLogin.classList.remove("active");

}

btnLogin.onclick = function () {

    container.classList.remove("register");
    container.classList.add("login");

    btnLogin.classList.add("active");
    btnRegister.classList.remove("active");

};
/* ===========================
   LOGIN
=========================== */

window.login = async function () {

  const email = document.getElementById("loginEmail").value.trim();

  const password = document.getElementById("loginPassword").value;


  if (email === "" || password === "") {

      alert("Email dan Password wajib diisi!");

      return;

  }


  try {

      // Login Firebase
      const userCredential = await signInWithEmailAndPassword(
          auth,
          email,
          password
      );

      const uid = userCredential.user.uid;


      // Ambil data user dari Firestore
      const userRef = doc(db, "users", uid);

      const userSnap = await getDoc(userRef);


      if (!userSnap.exists()) {

          alert("Data pengguna tidak ditemukan.");

          return;

      }


      const data = userSnap.data();


      // Redirect berdasarkan role
      if (data.role === "admin") {

          window.location.href = "admin.html";

      } else {

          window.location.href = "user.html";

      }

  } catch (error) {

      console.error(error);

      switch (error.code) {

          case "auth/invalid-email":
              alert("Format email tidak valid.");
              break;

          case "auth/user-not-found":
              alert("Email belum terdaftar.");
              break;

          case "auth/wrong-password":
              alert("Password salah.");
              break;

          case "auth/invalid-credential":
              alert("Email atau password salah.");
              break;

          case "auth/too-many-requests":
              alert("Terlalu banyak percobaan login. Coba beberapa saat lagi.");
              break;

          default:
              alert("Login gagal.\n\n" + error.message);

      }

  }

};
/* ===========================
   REGISTER
=========================== */

window.register = async function () {

  const nama = document.getElementById("nama").value.trim();

  const kelas = document.getElementById("kelas").value;

  const email = document.getElementById("regEmail").value.trim();

  const password = document.getElementById("regPassword").value;


  // Validasi
  if (nama === "" || kelas === "" || email === "" || password === "") {

      alert("Semua data wajib diisi!");

      return;

  }


  try {

      // Membuat akun Firebase Authentication
      const userCredential = await createUserWithEmailAndPassword(

          auth,

          email,

          password

      );


      const user = userCredential.user;


      // Simpan nama pada Firebase Authentication
      await updateProfile(user, {

          displayName: nama

      });


      // Simpan data user ke Firestore
      await setDoc(doc(db, "users", user.uid), {

          nama: nama,

          kelas: kelas,

          email: email,

          role: "user",

          dibuatPada: new Date()

      });


      alert("Registrasi berhasil.\nSilakan login.");


      // Kosongkan form
      document.getElementById("nama").value = "";

      document.getElementById("kelas").selectedIndex = 0;

      document.getElementById("regEmail").value = "";

      document.getElementById("regPassword").value = "";


      // Kembali ke form Login
      container.classList.remove("register");

      container.classList.add("login");

      btnLogin.classList.add("active");

      btnRegister.classList.remove("active");


  } catch (error) {

      console.error(error);


      switch (error.code) {

          case "auth/email-already-in-use":

              alert("Email sudah digunakan.");

              break;


          case "auth/invalid-email":

              alert("Format email tidak valid.");

              break;


          case "auth/weak-password":

              alert("Password minimal 6 karakter.");

              break;


          default:

              alert("Registrasi gagal.\n\n" + error.message);

      }

  }

};

</script>

</body>

</html>
