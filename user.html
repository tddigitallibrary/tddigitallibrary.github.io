<!DOCTYPE html>
<html>
<head>
<title>User Inventaris</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter';
background:linear-gradient(135deg,#eef2ff,#f8fafc);
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
position:relative;
}

.card:hover{
transform:translateY(-5px);
}

/* BADGE */
.badge{
position:absolute;
top:10px;
right:10px;
background:#6366f1;
color:white;
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

button{
margin-top:10px;
padding:8px;
border:none;
border-radius:8px;
background:#10b981;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h1>📦 Inventaris</h1>
<button onclick="logout()">Logout</button>
</div>

<div class="grid" id="list"></div>

<script type="module" src="user.js"></script>

</body>
</html>
